<!DOCTYPE html>
<html>
<head>
    <title>The Matriarch's Southern Soirées</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f5ef;
            color: #333;
        }

        .hero {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 4rem;
        }

        .section {
            padding: 80px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>

<div class="hero">
    <div>
        <h1>The Matriarch's Weekend</h1>
        <p>An Anderson, South Carolina Adventure</p>
    </div>
</div>

<div class="section">
    <div class="card">
        <h2>Friday</h2>
        <p>Arrival, charcuterie board, and relaxing evening.</p>
    </div>

    <div class="card">
        <h2>Saturday</h2>
        <p>Gardens, shopping, coffee, and photos.</p>
    </div>

    <div class="card">
        <h2>Sunday</h2>
        <p>Apothecary hour, tea, and memory making.</p>
    </div>
</div>

</body>
</html>
